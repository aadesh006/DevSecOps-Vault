name: Build and Release Vault

on:
  push:
    tags:
      - 'v*'

# FIX 1: Explicitly grant the bot permission to create releases
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Compile for Linux & macOS
      - name: Compile C++ Engine (Unix)
        if: runner.os != 'Windows'
        run: g++ main.cpp -o vault_scanner-${{ runner.os }}

      # Compile for Windows
      - name: Compile C++ Engine (Windows)
        if: runner.os == 'Windows'
        run: g++ main.cpp -o vault_scanner-${{ runner.os }}.exe

      # FIX 2: Use a wildcard to upload ONLY the binary this specific machine built
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # This wildcard catches either the Unix file or the Windows .exe file
          files: vault_scanner-*