name: Build and Release Vault

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    # 2. THE MATRIX: Tell GitHub to spin up 3 different operating systems
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # Step A: Download your repository code onto the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Compile for Linux & macOS
      - name: Compile C++ Engine (Unix)
        if: runner.os != 'Windows'
        run: g++ main.cpp -o vault_scanner-${{ runner.os }}

      # Step C: Compile for Windows (.exe)
      - name: Compile C++ Engine (Windows)
        if: runner.os == 'Windows'
        run: g++ main.cpp -o vault_scanner-Windows.exe

      # Step D: Upload the compiled binaries to the GitHub Release page
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Automatically draft the release notes based on your commit history
          generate_release_notes: true
          files: |
            vault_scanner-Linux
            vault_scanner-macOS
            vault_scanner-Windows.exe